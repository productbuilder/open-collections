<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid-5 Mixed Local Card Prototype</title>
    <style>
      :root { --bg:#f4f5f7; --text:#1f2937; --muted:#6b7280; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .page { max-width: 1320px; margin: 0 auto; padding: 32px 24px 80px; }
      .header { margin-bottom: 20px; }
      h1 { margin: 0 0 8px; font-size: 1.35rem; }
      .header p { margin: 0; color: var(--muted); }
      .grid-scroll { overflow: auto; padding-bottom: 16px; }
      .grid {
        min-width: 980px;
        display: grid;
        grid-template-columns: repeat(8, minmax(90px, 1fr));
        grid-auto-rows: 110px;
        grid-auto-flow: row dense;
        gap: 14px;
      }
      .tile-2x2 { grid-column: span 2; grid-row: span 2; }
      .tile-2x1 { grid-column: span 2; grid-row: span 1; }
      .tile-1x1 { grid-column: span 1; grid-row: span 1; }
      .tile-1x2 { grid-column: span 1; grid-row: span 2; }
      @media (max-width: 760px) {
        .page { padding: 20px 12px 56px; }
        .grid { min-width: 0; grid-template-columns: repeat(2, minmax(120px, 1fr)); grid-auto-rows: 120px; }
        .tile-2x1 { grid-row: span 2; }
        .tile-1x1 { grid-column: span 1; grid-row: span 1; }
        .tile-1x2 { grid-column: span 1; grid-row: span 2; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Grid-5 Mixed Card Prototype (Refined Source + Item Balance)</h1>
        <p>Standalone sandbox using local grid-5 components only.</p>
      </header>
      <section class="grid-scroll">
        <div class="grid" id="grid"></div>
      </section>
    </main>

    <script type="module">
      import './collections-card.js';
      import './collection-card.js';
      import './item-card.js';

      const entries = [
        { type: 'source', tile: 'tile-2x2', pos: 'grid-column:1 / span 2; grid-row:1 / span 2;', data: { title: 'Atlas Archive', subtitle: 'Atlas Organization', country: 'Canada', countLabel: '12 collections', actionLabel: 'Open source', previewRows: [['https://picsum.photos/seed/a11/220/120','https://picsum.photos/seed/a12/220/120','https://picsum.photos/seed/a13/220/120'],['https://picsum.photos/seed/a14/220/120','https://picsum.photos/seed/a15/220/120','https://picsum.photos/seed/a16/220/120'],['https://picsum.photos/seed/a17/220/120','https://picsum.photos/seed/a18/220/120','https://picsum.photos/seed/a19/220/120']] } },
        { type: 'item', tile: 'tile-2x1', pos: 'grid-column:3 / span 2; grid-row:1 / span 1;', data: { title: 'Signal Tower', subtitle: 'Photo · 1902', previewUrl: 'https://picsum.photos/seed/i11/320/220', actionLabel: 'View item' } },
        { type: 'collection', tile: 'tile-2x2', pos: 'grid-column:5 / span 2; grid-row:1 / span 2;', data: { title: 'Ports & Harbors', subtitle: 'Industrial coastline set', countLabel: '48 items', actionLabel: 'Open collection', previewImages: ['https://picsum.photos/seed/c11/220/140','https://picsum.photos/seed/c12/220/140','https://picsum.photos/seed/c13/220/140','https://picsum.photos/seed/c14/220/140','https://picsum.photos/seed/c15/220/140','https://picsum.photos/seed/c16/220/140'] } },
        { type: 'item', tile: 'tile-2x1', pos: 'grid-column:7 / span 2; grid-row:1 / span 1;', data: { title: 'Engine Room', subtitle: 'Scan · blueprint', previewUrl: 'https://picsum.photos/seed/i12/320/220', actionLabel: 'View item' } },
        { type: 'collection', tile: 'tile-2x2', pos: 'grid-column:3 / span 2; grid-row:2 / span 2;', data: { title: 'Festival Posters', subtitle: 'Print ephemera collection', countLabel: '26 items', actionLabel: 'Open collection', previewImages: ['https://picsum.photos/seed/c21/220/140','https://picsum.photos/seed/c22/220/140','https://picsum.photos/seed/c23/220/140','https://picsum.photos/seed/c24/220/140','https://picsum.photos/seed/c25/220/140','https://picsum.photos/seed/c26/220/140'] } },
        { type: 'source', tile: 'tile-2x2', pos: 'grid-column:7 / span 2; grid-row:2 / span 2;', data: { title: 'Delta Records', subtitle: 'Delta Cultural Trust', country: 'United States', countLabel: '9 collections', actionLabel: 'Open source', previewRows: [['https://picsum.photos/seed/d11/220/120','https://picsum.photos/seed/d12/220/120','https://picsum.photos/seed/d13/220/120'],['https://picsum.photos/seed/d14/220/120','https://picsum.photos/seed/d15/220/120','https://picsum.photos/seed/d16/220/120'],['https://picsum.photos/seed/d17/220/120','https://picsum.photos/seed/d18/220/120','https://picsum.photos/seed/d19/220/120']] } },
        { type: 'item', tile: 'tile-2x1', pos: 'grid-column:1 / span 2; grid-row:3 / span 1;', data: { title: 'Catalog Drawer', subtitle: 'Object · oak cabinet', previewUrl: 'https://picsum.photos/seed/i13/320/220', actionLabel: 'View item' } },
        { type: 'item', tile: 'tile-2x1', pos: 'grid-column:5 / span 2; grid-row:3 / span 1;', data: { title: 'Bridge Study', subtitle: 'Drawing · graphite', previewUrl: 'https://picsum.photos/seed/i14/320/220', actionLabel: 'View item' } },
        { type: 'source', tile: 'tile-2x2', pos: 'grid-column:1 / span 2; grid-row:4 / span 2;', data: { title: 'Northern Commons', subtitle: 'Regional Museum Network', country: 'Iceland', countLabel: '17 collections', actionLabel: 'Open source', previewRows: [['https://picsum.photos/seed/n11/220/120','https://picsum.photos/seed/n12/220/120','https://picsum.photos/seed/n13/220/120'],['https://picsum.photos/seed/n14/220/120','https://picsum.photos/seed/n15/220/120','https://picsum.photos/seed/n16/220/120'],['https://picsum.photos/seed/n17/220/120','https://picsum.photos/seed/n18/220/120','https://picsum.photos/seed/n19/220/120']] } },
        { type: 'collection', tile: 'tile-2x2', pos: 'grid-column:5 / span 2; grid-row:4 / span 2;', data: { title: 'Aerial Surveys', subtitle: 'Landscape image bundle', countLabel: '63 items', actionLabel: 'Open collection', previewImages: ['https://picsum.photos/seed/c31/220/140','https://picsum.photos/seed/c32/220/140','https://picsum.photos/seed/c33/220/140','https://picsum.photos/seed/c34/220/140','https://picsum.photos/seed/c35/220/140','https://picsum.photos/seed/c36/220/140'] } },
        { type: 'item', tile: 'tile-2x1', pos: 'grid-column:3 / span 2; grid-row:4 / span 1;', data: { title: 'Monument Detail', subtitle: 'Photo · stone carving', previewUrl: 'https://picsum.photos/seed/i15/320/220', actionLabel: 'View item' } },
        { type: 'item', tile: 'tile-1x2', pos: 'grid-column:7 / span 1; grid-row:4 / span 2;', data: { title: 'Transit Label', subtitle: 'Ephemera · ticket', previewUrl: 'https://picsum.photos/seed/i16/320/360', actionLabel: 'View item' } },
        { type: 'item', tile: 'tile-2x1', pos: 'grid-column:3 / span 2; grid-row:5 / span 1;', data: { title: 'River Stamp', subtitle: 'Mark · ink', previewUrl: 'https://picsum.photos/seed/i17/360/220', actionLabel: 'View item' } },
        { type: 'item', tile: 'tile-1x2', pos: 'grid-column:8 / span 1; grid-row:4 / span 2;', data: { title: 'Harbor Index', subtitle: 'Card · notation', previewUrl: 'https://picsum.photos/seed/i18/260/360', actionLabel: 'View item' } },
      ];

      const tagByType = {
        source: 'grid5-card-collections',
        collection: 'grid5-card-collection',
        item: 'grid5-card-item',
      };

      const grid = document.getElementById('grid');
      for (const entry of entries) {
        const el = document.createElement(tagByType[entry.type]);
        el.className = entry.tile;
        el.style.cssText = entry.pos;
        el.update(entry.data);
        grid.append(el);
      }
    </script>
  </body>
</html>
