<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrolling 3D Card Carousel v4-3 — Sandbox</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <script type="module" src="./oc-card-carousel.js"></script>
  </head>
  <body>
    <main>
      <!-- Use continuous, step, snap, wheel-snap for scroll-mode-->
      <oc-card-carousel
        id="carousel"
        scroll-vh-per-card="100"
        max-visible-cards="30"
        scroll-mode="wheel-snap"
        stack-height="25"
      ></oc-card-carousel>
    </main>

    
  <script type="module">
    const carousel = document.querySelector('#carousel')

    const cardCount = 100

    carousel.cards = Array.from({ length: cardCount }, (_, index) => {
      const number = cardCount - index

      return {
        id: String(number),
        title: String(number)
      }
    })
  </script>
  </body>
</html>
