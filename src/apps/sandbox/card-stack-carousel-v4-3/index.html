<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Scrolling 3D Card Carousel v4-3 — Sandbox</title>
	<link rel="stylesheet" href="./style.css" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
	<script type="module" src="./oc-card-carousel.js"></script>
	<script type="module" src="../../../shared/ui/primitives/index.js"></script>

	<style>
		html,
		body {
			margin: 0;
			width: 100%;
			min-height: 100%;
		}

		body {
			background: #ddd;
		}

		main {
			position: relative;
			width: 100%;
		}

		oc-map {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			z-index: 0;
			pointer-events: auto;
		}

		oc-card-carousel {
			position: relative;
			display: block;
			width: 100%;
			z-index: 10;
		}

		.demo-card {
			background: white;
			border: 1px solid #ccc;
			border-radius: 0.5rem;
			display: flex;
			align-items: center;
			justify-content: center;
			font: 3rem monospace;
		}

		.oc-card-carousel-card {
			background: white;
			border: 1px solid #ccc;
			border-radius: 0.5rem;
			display: flex;
			align-items: center;
			justify-content: center;
			font: 3rem monospace;
		}
	</style>
</head>

<body>
	<main>
		<!-- <oc-map id="map" center-lng="4.8933" center-lat="52.3728" zoom="16"
			style-url="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json"></oc-map> -->


			<oc-map
				id="map"
				class="app-map"
				style-url="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json"
				center-lng="5.1766"
				center-lat="52.2292"
				zoom="12.5"
				pitch="70"
				bearing="15"
				max-zoom="18"
				max-pitch="85"
				hash
			></oc-map>

		<!-- Use continuous, step, snap, wheel-snap for scroll-mode-->
		<oc-card-carousel id="carousel" scroll-vh-per-card="100" max-visible-cards="30" scroll-mode="wheel-snap"
			stack-height="30">
			<div class="demo-card">1</div>
			<div class="demo-card">2</div>
			<div class="demo-card">3</div>
			<div class="demo-card">4</div>
			<div class="demo-card">5</div>
			<div class="demo-card">6</div>
			<div class="demo-card">7</div>
			<div class="demo-card">8</div>
			<div class="demo-card">9</div>
		</oc-card-carousel>

	</main>

</body>

</html>
