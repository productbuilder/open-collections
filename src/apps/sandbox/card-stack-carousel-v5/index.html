<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrolling 3D Card Carousel — Sandbox v5 (Vanilla JS)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section class="pin-wrap" aria-label="scroll-pinned carousel section">
        <div class="carousel" aria-live="off">
          <div class="card">7</div>
          <div class="card">6</div>
          <div class="card">5</div>
          <div class="card">4</div>
          <div class="card">3</div>
          <div class="card">2</div>
          <div class="card">1</div>
        </div>
        <svg class="arrow" viewBox="0 0 2 10" aria-hidden="true">
          <path d="M1,0 1,10" />
        </svg>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
