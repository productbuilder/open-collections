<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialog Flow v1 — Sandbox</title>
    <style>
      :root {
        --bg: #f2f5fb;
        --ink: #1a2540;
        --ink-soft: #52607f;
        --panel: #ffffff;
        --line: #d6deef;
        --accent: #2f67ff;
        --accent-soft: #e9efff;
        --accent-strong: #153eab;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 0% 0%, #dfe9ff 0%, transparent 40%),
          radial-gradient(circle at 100% 100%, #e8f4ff 0%, transparent 38%),
          var(--bg);
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
        gap: 0.5rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 2.2vw, 1.6rem);
        text-align: center;
      }

      .intro {
        margin: 0;
        color: var(--ink-soft);
      }

      .dialog {
        width: min(680px, 96vw);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 20px 48px rgba(18, 38, 88, 0.14);
        padding: 1.25rem;
        display: grid;
        gap: 1rem;
      }

      .dialog-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
      }

      .step-label {
        margin: 0;
        font-size: 0.82rem;
        color: var(--ink-soft);
      }

      .dialog-header h2 {
        margin: 0.3rem 0 0;
        font-size: clamp(1.2rem, 2.8vw, 1.6rem);
      }

      .close-btn {
        border: 1px solid var(--line);
        background: transparent;
        border-radius: 10px;
        width: 36px;
        height: 36px;
        font-size: 1rem;
        color: var(--ink-soft);
        cursor: pointer;
      }

      .progress-track {
        background: #eef2fb;
        border-radius: 999px;
        height: 10px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), #6b96ff);
        transition: width 180ms ease;
      }

      .description {
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.45;
      }

      .more-info-block {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .more-info-toggle {
        width: 100%;
        border: 0;
        background: #f7f9ff;
        color: var(--ink);
        padding: 0.72rem 0.9rem;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        cursor: pointer;
      }

      .more-info-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 200ms ease;
      }

      .more-info-content.expanded {
        max-height: 220px;
      }

      .more-info-content p {
        margin: 0;
        padding: 0.85rem 0.9rem;
        color: var(--ink-soft);
      }

      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.7rem;
      }

      .option-card {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 12px;
        min-height: 58px;
        text-align: left;
        padding: 0.7rem 0.85rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        font-weight: 600;
        color: var(--ink);
      }

      .option-card:hover {
        border-color: #b4c4ea;
      }

      .option-card.selected {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .checkmark {
        font-size: 0.95rem;
      }

      .dialog-footer {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        padding-top: 0.25rem;
      }

      .dialog-footer button,
      .dialog-closed button,
      .primary-action {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 10px;
        padding: 0.65rem 0.95rem;
        cursor: pointer;
        font-weight: 600;
      }

      .dialog-footer button:last-child,
      .primary-action {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .summary {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.85rem;
        display: grid;
        gap: 0.75rem;
        background: #fbfcff;
      }

      .summary h3,
      .summary ul {
        margin: 0;
      }

      .summary ul {
        padding-left: 1.1rem;
        display: grid;
        gap: 0.2rem;
      }

      .summary pre {
        margin: 0;
        background: #f2f5fd;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.7rem;
        font-size: 0.82rem;
      }

      .dialog-closed {
        width: min(460px, 94vw);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 16px 32px rgba(18, 38, 88, 0.09);
        text-align: center;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
