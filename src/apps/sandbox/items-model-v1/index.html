<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Items Model v1 — Sandbox Presentation</title>
    <style>
      :root {
        --page-bg: #f5f6f8;
        --card-bg: #ffffff;
        --line: #d9dce3;
        --line-strong: #c6cad4;
        --text: #1f2937;
        --muted: #5f6b7d;
        --muted-soft: #808b9c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--page-bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .app {
        width: min(1040px, 100%);
        margin: 0 auto;
      }

      .slides-viewport {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card-bg);
      }

      .slides-track {
        display: flex;
        transition: transform 320ms ease;
        will-change: transform;
      }

      .scene {
        flex: 0 0 100%;
        min-width: 0;
        display: grid;
        grid-template-columns: 1.05fr 1fr;
        gap: 1.5rem;
        padding: clamp(1rem, 2.8vw, 2rem);
      }

      .kicker {
        margin: 0;
        color: var(--muted-soft);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 0.74rem;
      }

      h2 {
        margin: 0.5rem 0 0.85rem;
        font-size: clamp(1.4rem, 2.3vw, 2rem);
        line-height: 1.2;
      }

      .lead {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.2vw, 1.08rem);
        line-height: 1.55;
      }

      ul {
        margin: 1rem 0 0;
        display: grid;
        gap: 0.5rem;
        padding-left: 1.1rem;
      }

      li {
        color: #2d3748;
      }

      .scene-visual {
        display: flex;
      }

      .visual-card {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 1rem;
        background: #fff;
      }

      .pillars,
      .table,
      .layers,
      .levels {
        display: grid;
        gap: 0.7rem;
      }

      .pill {
        display: inline-flex;
        width: fit-content;
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        background: #f7f8fb;
        border: 1px solid var(--line);
      }

      .item-card h3,
      .layer h4,
      .level h4 {
        margin: 0;
      }

      .item-card p,
      .layer p,
      .level p {
        color: var(--muted);
      }

      .tag-row {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.35rem;
      }

      .tag,
      .level-meta {
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-soft);
      }

      .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.3fr);
        gap: 0.7rem;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 0.65rem 0.75rem;
      }

      .interfaces .row {
        grid-template-columns: minmax(0, 0.75fr) minmax(0, 1fr) minmax(0, 1fr);
      }

      .row.head {
        border-style: dashed;
        color: var(--muted);
      }

      .dim,
      .iface {
        font-weight: 600;
      }

      .layer,
      .level {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.75rem;
      }

      .json-block {
        overflow: auto;
      }

      pre {
        margin: 0;
        color: #253043;
        font-size: 0.79rem;
        line-height: 1.45;
      }

      .footer-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-top: 0.9rem;
      }

      .step-dots {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
      }

      .step-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        border: 1px solid var(--line-strong);
        background: transparent;
        cursor: pointer;
      }

      .step-dot.active {
        background: #1f2937;
        border-color: #1f2937;
      }

      .scene-counter {
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        min-width: 3.5rem;
        text-align: center;
      }

      .nav-buttons {
        display: inline-flex;
        gap: 0.45rem;
      }

      button {
        border: 1px solid var(--line-strong);
        border-radius: 9px;
        background: #fff;
        color: var(--text);
        padding: 0.45rem 0.8rem;
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      @media (max-width: 920px) {
        .scene {
          grid-template-columns: 1fr;
        }

        .footer-controls {
          flex-wrap: wrap;
          justify-content: center;
        }
      }

      @media (max-width: 560px) {
        body {
          padding: 0.6rem;
        }

        .scene {
          padding: 0.9rem;
        }

        .step-dots {
          order: 3;
          width: 100%;
          overflow-x: auto;
          justify-content: flex-start;
          padding: 0.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="slides-viewport">
        <div id="scene-container" class="slides-track"></div>
      </main>

      <div class="footer-controls">
        <div id="progress-dots" class="step-dots" aria-label="Scene progress"></div>
        <div id="scene-counter" class="scene-counter">1 / 8</div>
        <div class="nav-buttons">
          <button id="prev-scene" type="button">Previous</button>
          <button id="next-scene" type="button">Next</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
