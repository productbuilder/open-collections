<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Items Model v1 — Sandbox Presentation</title>
    <style>
      :root {
        --bg: #060b1a;
        --panel: #0d1733;
        --panel-2: #101f46;
        --line: #2d3d6b;
        --text: #ebefff;
        --muted: #aeb9dd;
        --accent: #86b3ff;
        --accent-2: #7ce8cb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 0% 0%, #1a2a57 0%, var(--bg) 45%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        min-height: 100vh;
      }

      .app {
        width: min(1240px, 100vw - 2rem);
        margin: 0 auto;
        padding: 1rem 0 3rem;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.75rem 1rem;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 92%, black);
        backdrop-filter: blur(6px);
        border-radius: 0.85rem;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .brand strong {
        font-size: 1rem;
      }

      .brand span {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      button {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .counter {
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        min-width: 3.75rem;
        text-align: center;
      }

      .layout {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 1rem;
        margin-top: 1rem;
      }

      .progress-rail {
        position: sticky;
        top: 5.25rem;
        align-self: start;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .progress-dot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 36px;
        border-radius: 0.55rem;
        border: 1px solid var(--line);
        color: var(--muted);
        text-decoration: none;
        background: rgba(16, 31, 70, 0.5);
      }

      .progress-dot.active {
        color: #08132f;
        background: linear-gradient(130deg, var(--accent), var(--accent-2));
        border-color: transparent;
        font-weight: 700;
      }

      .scene-stack {
        display: grid;
        gap: 1rem;
      }

      .scene {
        min-height: min(86vh, 860px);
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: linear-gradient(150deg, rgba(16, 31, 70, 0.6), rgba(7, 14, 33, 0.8));
        display: grid;
        grid-template-columns: 1.05fr 1fr;
        gap: 1.25rem;
        padding: clamp(1rem, 2vw, 2rem);
        scroll-margin-top: 5.5rem;
      }

      .scene.active {
        border-color: color-mix(in srgb, var(--accent) 65%, white);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
      }

      .kicker {
        margin: 0;
        color: var(--accent-2);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.72rem;
      }

      h2 {
        margin: 0.45rem 0 0.9rem;
        font-size: clamp(1.55rem, 2.7vw, 2.45rem);
        line-height: 1.15;
      }

      .lead {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.02rem, 1.4vw, 1.22rem);
        line-height: 1.5;
        max-width: 62ch;
      }

      ul {
        margin: 1rem 0 0;
        display: grid;
        gap: 0.55rem;
        padding-left: 1.2rem;
      }

      li {
        color: #d7dff8;
      }

      .scene-visual {
        display: flex;
        align-items: stretch;
      }

      .visual-card {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 0.9rem;
        padding: 1rem;
        background: rgba(8, 18, 43, 0.82);
      }

      .pillars {
        display: grid;
        gap: 0.75rem;
      }

      .pill {
        display: inline-flex;
        width: fit-content;
        padding: 0.5rem 0.75rem;
        border-radius: 999px;
        background: rgba(134, 179, 255, 0.18);
        border: 1px solid rgba(134, 179, 255, 0.45);
      }

      .item-card h3 {
        margin: 0;
      }

      .item-card p {
        color: var(--muted);
      }

      .tag-row {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin-top: 0.35rem;
        font-size: 0.95rem;
      }

      .tag {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-2);
      }

      .table {
        display: grid;
        gap: 0.55rem;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.3fr);
        gap: 0.75rem;
        border: 1px solid rgba(80, 110, 173, 0.45);
        border-radius: 0.6rem;
        padding: 0.65rem 0.75rem;
      }

      .interfaces .row {
        grid-template-columns: minmax(0, 0.75fr) minmax(0, 1fr) minmax(0, 1fr);
      }

      .row.head {
        border-style: dashed;
        color: var(--muted);
      }

      .dim,
      .iface {
        font-weight: 700;
      }

      .layers {
        display: grid;
        gap: 0.7rem;
      }

      .layer {
        border: 1px solid rgba(124, 232, 203, 0.35);
        border-radius: 0.75rem;
        padding: 0.75rem;
      }

      .layer h4,
      .level h4 {
        margin: 0;
      }

      .layer p,
      .level p {
        margin: 0.45rem 0 0;
        color: var(--muted);
      }

      .level-meta {
        margin: 0;
        color: var(--accent-2);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .levels {
        display: grid;
        gap: 0.65rem;
      }

      .level {
        border: 1px solid rgba(134, 179, 255, 0.35);
        border-radius: 0.7rem;
        padding: 0.7rem;
      }

      .json-block {
        overflow: auto;
      }

      pre {
        margin: 0;
        font-size: 0.79rem;
        line-height: 1.45;
        color: #ddf7ff;
      }

      .version-tag {
        position: fixed;
        right: 0.75rem;
        bottom: 0.75rem;
        padding: 0.3rem 0.5rem;
        border: 1px solid rgba(134, 179, 255, 0.35);
        border-radius: 999px;
        font-size: 0.7rem;
        color: var(--muted);
        background: rgba(6, 11, 26, 0.8);
        pointer-events: none;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .progress-rail {
          flex-direction: row;
          top: 4.85rem;
          overflow: auto;
          padding-bottom: 0.25rem;
        }

        .scene {
          grid-template-columns: 1fr;
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <strong>Items Model Prototype · v1</strong>
          <span>Sandbox app · concept presentation + iteration baseline</span>
        </div>
        <div class="controls">
          <button id="prev-scene" type="button">← Prev</button>
          <div class="counter" id="scene-counter">1 / 8</div>
          <button id="next-scene" type="button">Next →</button>
        </div>
      </header>

      <div class="layout">
        <nav id="progress-rail" class="progress-rail" aria-label="Scene progress"></nav>
        <main id="scene-container" class="scene-stack"></main>
      </div>
    </div>
    <div class="version-tag">items-model-v1 · test update</div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
