<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map + Three sync v1 — Sandbox</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      main {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      oc-map {
        display: block;
        width: 100%;
        height: 100%;
        --oc-map-height: 100vh;
      }

      .overlay {
        position: absolute;
        z-index: 20;
        display: grid;
        gap: 0.65rem;
        width: min(360px, calc(100vw - 1.5rem));
        max-height: calc(100vh - 1.5rem);
        padding: 0.8rem;
        top: 0.75rem;
        left: 0.75rem;
        background: rgb(15 23 42 / 82%);
        border: 1px solid rgb(96 165 250 / 42%);
        border-radius: 12px;
        backdrop-filter: blur(2px);
        overflow: auto;
      }

      .title {
        margin: 0;
        font-size: 0.98rem;
      }

      .subtitle {
        margin: 0.15rem 0 0;
        font-size: 0.76rem;
        color: #cbd5e1;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.45rem;
        margin: 0;
      }

      .stat {
        background: rgb(15 23 42 / 78%);
        border: 1px solid #334155;
        border-radius: 9px;
        padding: 0.42rem 0.5rem;
      }

      .stat dt {
        margin: 0;
        font-size: 0.68rem;
        color: #93c5fd;
      }

      .stat dd {
        margin: 0.2rem 0 0;
        font-size: 0.84rem;
      }

      .pitch-row {
        display: grid;
        gap: 0.2rem;
      }

      .pitch-row label {
        font-size: 0.72rem;
        color: #bfdbfe;
      }

      .pitch-row input {
        width: 100%;
      }

      .btn-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.45rem;
      }

      button {
        border: 1px solid #3b82f6;
        border-radius: 8px;
        background: #1d4ed8;
        color: #eff6ff;
        padding: 0.42rem 0.55rem;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
      }

      .log {
        margin: 0;
        min-height: 82px;
        max-height: 180px;
        overflow: auto;
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 9px;
        padding: 0.5rem;
        font-size: 0.7rem;
        line-height: 1.33;
      }
    </style>
  </head>
  <body>
    <main>
      <oc-map
        id="demo-map"
        center-lng="5.1214"
        center-lat="52.0907"
        zoom="14.5"
        pitch="40"
        bearing="18"
        style-url="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json"
      ></oc-map>
      <oc-map-three-layer id="demo-three-layer" for="demo-map" layer-id="demo-three-custom-layer"></oc-map-three-layer>

      <aside class="overlay" aria-label="Three layer debug controls">
        <header>
          <h1 class="title">Map + Three sync v1</h1>
          <p class="subtitle">Full-screen scene test for pitch, horizon, and depth cues.</p>
        </header>

        <dl class="stats" id="viewport-stats">
          <div class="stat">
            <dt>Center</dt>
            <dd id="stat-center">—</dd>
          </div>
          <div class="stat">
            <dt>Zoom</dt>
            <dd id="stat-zoom">—</dd>
          </div>
          <div class="stat">
            <dt>Pitch</dt>
            <dd id="stat-pitch">—</dd>
          </div>
          <div class="stat">
            <dt>Bearing</dt>
            <dd id="stat-bearing">—</dd>
          </div>
        </dl>

        <div class="pitch-row">
          <label for="pitch-control">Pitch slider: <strong id="pitch-slider-value">0</strong>°</label>
          <input id="pitch-control" type="range" min="0" max="60" value="40" step="1" />
        </div>

        <div class="btn-grid">
          <button type="button" data-action="reset-view">Reset view</button>
          <button type="button" data-action="add-anchors">Add anchors</button>
          <button type="button" data-action="clear-anchors">Clear anchors</button>
          <button type="button" data-action="flat">Flat</button>
          <button type="button" data-action="browse">Browse</button>
          <button type="button" data-action="spatial">Spatial</button>
          <button type="button" data-action="horizon-test">Horizon test</button>
        </div>

        <pre class="log" id="event-log">Waiting for map...</pre>
      </aside>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
