<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Map + Three sync v2 — Terrain Sandbox</title>
		<style>
			* {
				box-sizing: border-box;
			}

			:root {
				color-scheme: dark;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family:
					Inter,
					ui-sans-serif,
					system-ui,
					-apple-system,
					Segoe UI,
					Roboto,
					Helvetica,
					Arial,
					sans-serif;
				background: #020617;
				color: #e2e8f0;
			}

			main {
				position: relative;
				width: 100vw;
				height: 100vh;
				overflow: hidden;
			}

			oc-map {
				display: block;
				width: 100%;
				height: 100%;
				--oc-map-height: 100vh;
			}

			.horizon-mask {
				position: absolute;
				inset: 0;
				z-index: 10;
				pointer-events: none;
				opacity: 0;
				transition: opacity 180ms ease;
				background:
					radial-gradient(
						130% 56% at 50% -10%,
						rgb(191 219 254 / 18%) 0%,
						rgb(191 219 254 / 0%) 70%
					),
					linear-gradient(to bottom, rgb(2 6 23 / 0%) 50%, rgb(2 6 23 / 18%) 100%);
			}

			main[data-fake-horizon="true"] .horizon-mask {
				opacity: 1;
			}

			.helper-toggle {
				position: absolute;
				z-index: 40;
				top: 0.75rem;
				left: 0.75rem;
				pointer-events: auto;
				border: 1px solid rgb(96 165 250 / 80%);
				border-radius: 999px;
				background: rgb(29 78 216 / 86%);
				color: #eff6ff;
				font-size: 0.76rem;
				padding: 0.42rem 0.72rem;
				cursor: pointer;
			}

			.overlay {
				position: absolute;
				z-index: 39;
				display: grid;
				gap: 0.65rem;
				width: min(360px, calc(100vw - 1.5rem));
				max-height: calc(100vh - 1.5rem);
				padding: 0.8rem;
				top: 0.75rem;
				left: 0.75rem;
				background: rgb(15 23 42 / 88%);
				border: 1px solid rgb(96 165 250 / 42%);
				border-radius: 12px;
				backdrop-filter: blur(2px);
				overflow: auto;
			}

			.overlay[hidden] {
				display: none;
			}

			.overlay-header {
				display: flex;
				align-items: start;
				justify-content: space-between;
				gap: 0.5rem;
			}

			.overlay-close {
				pointer-events: auto;
				border: 1px solid #475569;
				border-radius: 8px;
				background: #0f172a;
				color: #cbd5e1;
				padding: 0.2rem 0.45rem;
				font-size: 0.72rem;
				cursor: pointer;
			}

			.title {
				margin: 0;
				font-size: 0.98rem;
			}

			.subtitle {
				margin: 0.15rem 0 0;
				font-size: 0.76rem;
				color: #cbd5e1;
			}

			.stats {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 0.45rem;
				margin: 0;
			}

			.stat {
				background: rgb(15 23 42 / 78%);
				border: 1px solid #334155;
				border-radius: 9px;
				padding: 0.42rem 0.5rem;
			}

			.stat dt {
				margin: 0;
				font-size: 0.68rem;
				color: #93c5fd;
			}

			.stat dd {
				margin: 0.2rem 0 0;
				font-size: 0.84rem;
			}

			.pitch-row {
				display: grid;
				gap: 0.2rem;
			}

			.pitch-row label {
				font-size: 0.72rem;
				color: #bfdbfe;
			}

			.pitch-row input {
				width: 100%;
			}

			.toggle-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 0.45rem;
				padding: 0.32rem 0.45rem;
				border-radius: 8px;
				border: 1px solid #334155;
				background: rgb(2 6 23 / 74%);
			}

			.toggle-label {
				font-size: 0.74rem;
				color: #bfdbfe;
			}

			.toggle-row input {
				inline-size: 1rem;
				block-size: 1rem;
			}

			.btn-grid {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 0.45rem;
			}

			button {
				border: 1px solid #3b82f6;
				border-radius: 8px;
				background: #1d4ed8;
				color: #eff6ff;
				padding: 0.42rem 0.55rem;
				cursor: pointer;
				font-size: 0.78rem;
				font-weight: 600;
			}

			.log {
				margin: 0;
				min-height: 82px;
				max-height: 170px;
				overflow: auto;
				background: #020617;
				border: 1px solid #1e293b;
				border-radius: 9px;
				padding: 0.5rem;
				font-size: 0.7rem;
				line-height: 1.33;
			}
		</style>
	</head>
	<body>
		<main id="sandbox-stage" data-fake-horizon="false">
			<oc-map
				id="demo-map"
				center-lng="11.391"
				center-lat="47.268"
				zoom="11.1"
				pitch="52"
				bearing="28"
				style-url="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json"
			></oc-map>
			<oc-map-three-layer
				id="demo-three-layer"
				for="demo-map"
				layer-id="demo-three-custom-layer-v2"
			></oc-map-three-layer>
			<div class="horizon-mask" aria-hidden="true"></div>

			<button
				type="button"
				id="helper-toggle"
				class="helper-toggle"
				aria-expanded="false"
				aria-controls="helper-panel"
			>
				Debug
			</button>

			<aside
				class="overlay"
				id="helper-panel"
				aria-label="Terrain sync debug controls"
				hidden
			>
				<header class="overlay-header">
					<div>
						<h1 class="title">Map + Three sync v2</h1>
						<p class="subtitle">
							Terrain-backed horizon + anchor sync evaluation.
						</p>
					</div>
					<button type="button" id="helper-close" class="overlay-close">
						Close
					</button>
				</header>

				<dl class="stats">
					<div class="stat">
						<dt>Center</dt>
						<dd id="stat-center">—</dd>
					</div>
					<div class="stat">
						<dt>Zoom</dt>
						<dd id="stat-zoom">—</dd>
					</div>
					<div class="stat">
						<dt>Pitch</dt>
						<dd id="stat-pitch">—</dd>
					</div>
					<div class="stat">
						<dt>Bearing</dt>
						<dd id="stat-bearing">—</dd>
					</div>
				</dl>

				<div class="pitch-row">
					<label for="pitch-control"
						>Pitch slider: <strong id="pitch-slider-value">0</strong>°</label
					>
					<input
						id="pitch-control"
						type="range"
						min="0"
						max="80"
						value="52"
						step="1"
					/>
				</div>

				<div class="toggle-row">
					<label class="toggle-label" for="horizon-toggle"
						>Optional fake horizon comparison</label
					>
					<input id="horizon-toggle" type="checkbox" />
				</div>

				<div class="btn-grid">
					<button type="button" data-action="reset-view">Reset view</button>
					<button type="button" data-action="add-anchors">Add anchors</button>
					<button type="button" data-action="clear-anchors">Clear anchors</button>
					<button type="button" data-action="flat">Flat</button>
					<button type="button" data-action="browse">Browse</button>
					<button type="button" data-action="spatial">Spatial</button>
					<button type="button" data-action="horizon-test">Horizon test</button>
				</div>

				<pre class="log" id="event-log">Waiting for map...</pre>
			</aside>
		</main>

		<script type="module" src="./app.js"></script>
	</body>
</html>
