<!doctype html>
<html lang="en">
  <head>
    <title>MapLibre Sky/Fog/Terrain Baseline v1</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .panel {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 1;
        width: 252px;
        border-radius: 8px;
        padding: 10px;
        background: rgba(35, 35, 35, 0.62);
        color: #fff;
        font: 12px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        opacity: 0;
        transition: opacity 220ms ease;
      }

      .panel.is-visible,
      .panel:hover,
      .panel:focus-within {
        opacity: 1;
      }

      .panel h1 {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 600;
      }

      .panel h2 {
        margin: 8px 0 6px;
        font-size: 12px;
        font-weight: 600;
        color: #f0f0f0;
      }

      .presets {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-bottom: 8px;
      }

      .fov-presets {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
        margin-bottom: 8px;
      }

      .presets button,
      .fov-presets button {
        border: 1px solid #777;
        border-radius: 4px;
        padding: 6px;
        cursor: pointer;
        color: #fff;
        background: #4a4a4a;
      }

      .panel label {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .fov-label {
        justify-content: space-between;
        margin: 4px 0;
      }

      .fov-slider {
        width: 100%;
        margin-bottom: 8px;
      }

      .hint {
        margin-top: 8px;
        color: #d8d8d8;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="panel" aria-label="camera presets">
      <h1>Baseline camera presets</h1>
      <div class="presets">
        <button id="flat-btn" type="button">Flat</button>
        <button id="browse-btn" type="button">Browse</button>
        <button id="spatial-btn" type="button">Spatial</button>
        <button id="horizon-btn" type="button">Horizon</button>
      </div>

      <h2>FOV test</h2>
      <label for="fov-slider" class="fov-label">
        Vertical FOV
        <span id="fov-value">36.87°</span>
      </label>
      <input
        id="fov-slider"
        class="fov-slider"
        type="range"
        min="30"
        max="55"
        step="0.01"
        value="36.87"
      />
      <div class="fov-presets" aria-label="fov presets">
        <button id="fov-default-btn" type="button">Default</button>
        <button id="fov-wide-btn" type="button">Wide</button>
        <button id="fov-wider-btn" type="button">Wider</button>
      </div>
      <div class="fov-presets" aria-label="horizon fov compare">
        <button id="horizon-default-btn" type="button">Hzn 36.87</button>
        <button id="horizon-wide-btn" type="button">Hzn 45</button>
        <button id="horizon-wider-btn" type="button">Hzn 50</button>
      </div>

      <label for="sky-enabled">
        <input id="sky-enabled" type="checkbox" checked />
        Sky enabled
      </label>
      <div class="hint">Use “Horizon” plus FOV controls to compare horizon visibility/depth quickly.</div>
    </div>

    <script>
      const DEFAULT_SKY = {
        'sky-color': '#88C6FC',
        'horizon-color': '#ffffff',
        'fog-color': '#ffffff',
        'sky-horizon-blend': 0.75,
        'horizon-fog-blend': 0.9,
        'fog-ground-blend': 0.45
      };

      const FOV_PRESETS = {
        default: 36.87,
        wide: 45,
        wider: 50
      };

      const HORIZON_CAMERA = {
        center: [11.2953, 47.5479],
        zoom: 10.5,
        pitch: 78,
        bearing: 15
      };

      const map = new maplibregl.Map({
        container: 'map',
        zoom: 12,
        center: [11.2953, 47.5479],
        pitch: 77,
        hash: true,
        style: {
          version: 8,
          sources: {
            osm: {
              type: 'raster',
              tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'],
              tileSize: 256,
              attribution: '&copy; OpenStreetMap Contributors',
              maxzoom: 19
            },
            terrainSource: {
              type: 'raster-dem',
              url: 'https://tiles.mapterhorn.com/tilejson.json',
              tileSize: 256
            },
            hillshadeSource: {
              type: 'raster-dem',
              url: 'https://tiles.mapterhorn.com/tilejson.json',
              tileSize: 256
            }
          },
          layers: [
            {
              id: 'osm',
              type: 'raster',
              source: 'osm'
            },
            {
              id: 'hills',
              type: 'hillshade',
              source: 'hillshadeSource',
              layout: { visibility: 'visible' },
              paint: { 'hillshade-shadow-color': '#473B24' }
            }
          ],
          terrain: {
            source: 'terrainSource',
            exaggeration: 0.8
          }
        },
        maxZoom: 18,
        maxPitch: 85
      });

      function setSkyEnabled(isEnabled) {
        if (isEnabled) {
          map.setSky(DEFAULT_SKY);
          return;
        }
        map.setSky(undefined);
      }

      function flyToPreset(options) {
        map.flyTo({
          duration: 1100,
          essential: true,
          ...options
        });
      }

      function formatFov(value) {
        return `${Number(value).toFixed(2)}°`;
      }

      function setVerticalFov(value) {
        const numericValue = Number(value);
        map.setVerticalFieldOfView(numericValue);
        document.getElementById('fov-slider').value = String(numericValue);
        document.getElementById('fov-value').textContent = formatFov(numericValue);
      }

      function jumpToHorizonWithFov(fov) {
        map.jumpTo(HORIZON_CAMERA);
        setVerticalFov(fov);
      }

      map.addControl(
        new maplibregl.NavigationControl({
          visualizePitch: true,
          showZoom: true,
          showCompass: true
        })
      );

      map.on('load', () => {
        setSkyEnabled(true);
        setVerticalFov(FOV_PRESETS.default);

        const panel = document.querySelector('.panel');
        panel.classList.add('is-visible');
        window.setTimeout(() => panel.classList.remove('is-visible'), 2000);

        const skyToggle = document.getElementById('sky-enabled');
        skyToggle.addEventListener('change', () => setSkyEnabled(skyToggle.checked));

        document.getElementById('flat-btn').addEventListener('click', () => {
          flyToPreset({ center: [11.2953, 47.5479], zoom: 11.3, pitch: 0, bearing: 0 });
        });

        document.getElementById('browse-btn').addEventListener('click', () => {
          flyToPreset({ center: [11.2953, 47.5479], zoom: 12.6, pitch: 45, bearing: 20 });
        });

        document.getElementById('spatial-btn').addEventListener('click', () => {
          flyToPreset({ center: [11.2953, 47.5479], zoom: 12.8, pitch: 63, bearing: 35 });
        });

        document.getElementById('horizon-btn').addEventListener('click', () => {
          flyToPreset(HORIZON_CAMERA);
        });

        document.getElementById('fov-slider').addEventListener('input', event => {
          setVerticalFov(event.target.value);
        });

        document.getElementById('fov-default-btn').addEventListener('click', () => {
          setVerticalFov(FOV_PRESETS.default);
        });

        document.getElementById('fov-wide-btn').addEventListener('click', () => {
          setVerticalFov(FOV_PRESETS.wide);
        });

        document.getElementById('fov-wider-btn').addEventListener('click', () => {
          setVerticalFov(FOV_PRESETS.wider);
        });

        document.getElementById('horizon-default-btn').addEventListener('click', () => {
          jumpToHorizonWithFov(FOV_PRESETS.default);
        });

        document.getElementById('horizon-wide-btn').addEventListener('click', () => {
          jumpToHorizonWithFov(FOV_PRESETS.wide);
        });

        document.getElementById('horizon-wider-btn').addEventListener('click', () => {
          jumpToHorizonWithFov(FOV_PRESETS.wider);
        });
      });
    </script>
  </body>
</html>
