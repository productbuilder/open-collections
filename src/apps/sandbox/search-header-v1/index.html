<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Header v1 — Sandbox</title>
    <style>
      :root {
        --ink: #1b2940;
        --ink-soft: #526385;
        --line: #ccdaee;
        --surface: #ffffff;
        --accent: #245ff2;
        --accent-soft: #e8efff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: #dce6f8;
      }

      .screen {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .floating-header {
        position: absolute;
        inset: 0.8rem 0.8rem auto;
        z-index: 10;
        min-height: 42px;
      }

      .control-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .search-wrap {
        position: relative;
        min-width: 0;
        flex: 0 1 56%;
        transition: flex-basis 200ms ease, flex-grow 200ms ease, transform 200ms ease;
        z-index: 2;
      }

      .expanded .search-wrap {
        flex-basis: 100%;
        flex-grow: 1;
        transform: translateZ(0);
      }

      .row-actions {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        opacity: 1;
        transform: translateX(0) scale(1);
        transition: opacity 190ms ease, transform 200ms ease, visibility 0ms linear 0ms;
      }

      .expanded .row-actions {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateX(10px) scale(0.98);
        transition: opacity 180ms ease, transform 200ms ease, visibility 0ms linear 200ms;
      }

      .search-icon {
        position: absolute;
        left: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: #7b8ead;
      }

      .search-input {
        width: 100%;
        border: 1px solid rgba(189, 205, 230, 0.95);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(4px);
        padding: 0.72rem 0.95rem 0.72rem 2.3rem;
        font-size: 0.95rem;
        color: var(--ink);
        outline: none;
      }

      .search-wrap.expanded .search-input {
        padding-right: 2.6rem;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(36, 95, 242, 0.18);
      }

      .pill-btn,
      .icon-btn {
        border: 1px solid rgba(189, 205, 230, 0.95);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(4px);
        color: var(--ink);
        height: 42px;
        padding: 0 0.82rem;
        display: inline-flex;
        align-items: center;
        gap: 0.42rem;
        font-size: 0.9rem;
        white-space: nowrap;
        cursor: pointer;
      }

      .pill-btn svg,
      .icon-btn svg {
        width: 16px;
        height: 16px;
        color: #687da4;
      }

      .icon-btn {
        padding-inline: 0.7rem;
      }

      .clear-btn {
        position: absolute;
        right: 0.34rem;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        padding: 0;
        border-color: transparent;
        background: transparent;
      }

      .pill-btn.active {
        border-color: #9bb8ff;
        background: var(--accent-soft);
        color: #173d9f;
      }

      .badge {
        border-radius: 999px;
        min-width: 1.2rem;
        padding: 0.05rem 0.35rem;
        background: var(--accent);
        color: #fff;
        font-size: 0.76rem;
        text-align: center;
      }


      .background-layer {
        position: absolute;
        inset: 0;
      }

      .map-view,
      .list-view {
        position: absolute;
        inset: 0;
      }

      .map-view {
        background:
          radial-gradient(circle at 17% 20%, #8bc4f5 0%, transparent 23%),
          radial-gradient(circle at 82% 30%, #b6d8f8 0%, transparent 25%),
          linear-gradient(25deg, #d6ead5 0 32%, #c6defa 32% 68%, #d8efd6 68% 100%);
      }

      .map-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(92deg, rgba(255, 255, 255, 0.5) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.45) 1px, transparent 1px);
        background-size: 56px 56px;
        opacity: 0.5;
      }

      .map-water {
        position: absolute;
        left: -8%;
        top: 52%;
        width: 130%;
        height: 22%;
        background: rgba(117, 184, 238, 0.52);
        transform: rotate(-5deg);
      }

      .pin {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        background: #255ce0;
        box-shadow: 0 2px 6px rgba(30, 57, 114, 0.28);
      }

      .pin::after {
        content: '';
        position: absolute;
        inset: 3px;
        border-radius: 50%;
        background: #fff;
      }

      .list-view {
        background: linear-gradient(180deg, #f5f8ff 0%, #eaf1ff 100%);
        padding: 5.2rem 0.85rem 1rem;
        overflow: auto;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.72rem;
      }

      .result-card {
        border: 1px solid #d3def0;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 4px 12px rgba(48, 73, 122, 0.08);
        overflow: hidden;
      }

      .result-thumb {
        aspect-ratio: 4 / 3;
        background: linear-gradient(135deg, #d4e4ff, #bdd2f7 45%, #d6f0dd);
      }

      .result-meta {
        padding: 0.55rem;
      }

      .line {
        height: 8px;
        border-radius: 6px;
        background: #dce6f8;
      }

      .line + .line {
        margin-top: 0.4rem;
      }

      .line.short {
        width: 62%;
      }

      .state-panel {
        position: absolute;
        left: 0.8rem;
        right: 0.8rem;
        bottom: 0.8rem;
        z-index: 12;
        border: 1px solid rgba(199, 213, 236, 0.9);
        border-radius: 14px;
        padding: 0.72rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(4px);
      }

      .state-panel h2 {
        margin: 0 0 0.35rem;
        font-size: 0.84rem;
        color: var(--ink-soft);
      }

      .state-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.35rem 0.5rem;
      }

      .state-item {
        font-size: 0.8rem;
      }

      .state-item b {
        font-size: 0.82rem;
      }

      @media (min-width: 680px) {
        .screen {
          max-width: 460px;
          margin: 0 auto;
          border-inline: 1px solid rgba(194, 210, 236, 0.9);
          box-shadow: 0 14px 30px rgba(42, 69, 120, 0.14);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
