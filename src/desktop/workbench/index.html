<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Collections</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #0f1218;
        color: #e7ecf3;
      }

      .shell {
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .shell-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.6rem 0.8rem;
        border-bottom: 1px solid #2b3342;
        background: #151b29;
      }

      .shell-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .switcher {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }

      .switch-btn {
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 0.35rem 0.65rem;
        background: #111827;
        color: #e2e8f0;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
      }

      .switch-btn:hover {
        border-color: #4b5563;
        background: #1f2937;
      }

      .switch-btn.is-active {
        border-color: #0f6cc6;
        background: #0f6cc6;
        color: #ffffff;
      }

      .host {
        display: grid;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        background: #0f1218;
      }

      .host > * {
        grid-area: 1 / 1;
        display: block;
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
      }

      .host > *[hidden] {
        display: none !important;
      }

      @media (max-width: 760px) {
        .shell-bar {
          align-items: flex-start;
          flex-direction: column;
        }

        .switcher {
          width: 100%;
        }

        .switch-btn {
          flex: 1;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="shell-bar">
        <h1 class="shell-title">Open Collections</h1>
        <nav class="switcher" aria-label="App switcher">
          <button id="switchManager" class="switch-btn" type="button" data-app="manager">Manager</button>
          <button id="switchBrowser" class="switch-btn" type="button" data-app="browser">Browser</button>
        </nav>
      </header>
      <main id="host" class="host"></main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
