<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover"
		/>
		<title>Open Collections Browser</title>
		<style>
			html,
			body {
				margin: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
			}

			body {
				font-family: system-ui, sans-serif;
				background: #0f1218;
				color: #e7ecf3;
				padding-top: env(safe-area-inset-top, 0px);
				padding-right: env(safe-area-inset-right, 0px);
				padding-bottom: env(safe-area-inset-bottom, 0px);
				padding-left: env(safe-area-inset-left, 0px);
			}

			.host {
				width: 100%;
				height: 100%;
				min-height: 0;
				min-width: 0;
				overflow: hidden;
				background: #0f1218;
			}

			.host > * {
				display: block;
				width: 100%;
				height: 100%;
				min-height: 0;
				min-width: 0;
			}
		</style>
	</head>
	<body>
		<main id="host" class="host"></main>

		<script type="module" src="./src/main.js"></script>
	</body>
</html>
