<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>oc-map local verification</title>
		<style>
			body {
				margin: 0;
				font-family:
					Inter,
					ui-sans-serif,
					system-ui,
					-apple-system,
					Segoe UI,
					Roboto,
					Helvetica,
					Arial,
					sans-serif;
				background: #f5f7fb;
				color: #17202a;
			}

			main {
				max-width: 980px;
				margin: 0 auto;
				padding: 12px;
				display: grid;
				gap: 12px;
				box-sizing: border-box;
			}

			.panel {
				background: #fff;
				border: 1px solid #d8deea;
				border-radius: 12px;
				padding: 12px;
			}

			.controls {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				align-items: center;
			}

			button {
				border: 1px solid #b8c2d6;
				background: #fff;
				border-radius: 8px;
				padding: 6px 10px;
				cursor: pointer;
			}

			label {
				display: inline-flex;
				align-items: center;
				gap: 6px;
			}

			.map-panel {
				padding: 0;
				overflow: hidden;
			}

			oc-map {
				display: block;
				inline-size: 100%;
				--oc-map-height: clamp(280px, 58vh, 520px);
			}

			#status,
			#selection-status {
				font-size: 13px;
			}

			@media (min-width: 720px) {
				main {
					padding: 20px;
				}

				oc-map {
					--oc-map-height: clamp(320px, 62vh, 600px);
				}
			}

			pre {
				margin: 0;
				max-height: 160px;
				overflow: auto;
				background: #0d1420;
				color: #d7e2f0;
				border-radius: 8px;
				padding: 8px;
				font-size: 12px;
			}
		</style>
	</head>
	<body>
		<main>
			<header class="panel">
				<h1>oc-map local verification</h1>
				<p>Development-only page for manual primitive verification.</p>
			</header>

			<section class="panel controls">
				<button id="fit-data" type="button">Fit to sample data</button>
				<button id="clear-selection" type="button">
					Clear selection
				</button>
				<label
					><input id="toggle-points" type="checkbox" checked />
					Points</label
				>
				<label
					><input id="toggle-line" type="checkbox" checked />
					Line</label
				>
				<label
					><input id="toggle-polygon" type="checkbox" checked />
					Polygon</label
				>
				<span id="status">Waiting for map...</span>
				<span id="selection-status">Selection: none</span>
			</section>

			<section class="panel map-panel">
				<oc-map
					id="demo-map"
					center-lng="5.1766"
					center-lat="52.2249"
					zoom="14.1"
					style-url="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json"
				></oc-map>
			</section>

			<section class="panel">
				<strong>Event log</strong>
				<pre id="log">No events yet.</pre>
			</section>
		</main>

		<script type="module">
			import "../index.js";

			const mapEl = document.getElementById("demo-map");
			const statusEl = document.getElementById("status");
			const selectionStatusEl =
				document.getElementById("selection-status");
			const logEl = document.getElementById("log");

			const pointsData = {
				type: "FeatureCollection",
				features: [
					{
						type: "Feature",
						id: "marktplein",
						properties: { name: "Hilversum Marktplein (QA point)" },
						geometry: {
							type: "Point",
							coordinates: [5.1759, 52.2247],
						},
					},
					{
						type: "Feature",
						id: "stationsplein",
						properties: { name: "Stationsplein" },
						geometry: {
							type: "Point",
							coordinates: [5.1769, 52.225],
						},
					},
					{
						type: "Feature",
						id: "raadhuis",
						properties: { name: "Raadhuis Hilversum" },
						geometry: {
							type: "Point",
							coordinates: [5.1689, 52.2301],
						},
					},
				],
			};

			const lineData = {
				type: "FeatureCollection",
				features: [
					{
						type: "Feature",
						id: "sample-route",
						properties: { name: "Sample route" },
						geometry: {
							type: "LineString",
							coordinates: [
								[5.1695, 52.2303],
								[5.1728, 52.2284],
								[5.1762, 52.2263],
								[5.1791, 52.2248],
								[5.1822, 52.2232],
							],
						},
					},
				],
			};

			const polygonData = {
				type: "FeatureCollection",
				features: [
					{
						type: "Feature",
						id: "sample-region",
						properties: { name: "Compact local region" },
						geometry: {
							type: "Polygon",
							coordinates: [
								[
									[5.1684, 52.2236],
									[5.1812, 52.2236],
									[5.1812, 52.2298],
									[5.1684, 52.2298],
									[5.1684, 52.2236],
								],
							],
						},
					},
				],
			};

			const allSamplesData = {
				type: "FeatureCollection",
				features: [
					...pointsData.features,
					...lineData.features,
					...polygonData.features,
				],
			};

			const appendLog = (label, detail) => {
				const line = `${new Date().toISOString()} ${label}${detail ? `: ${JSON.stringify(detail, null, 0)}` : ""}`;
				logEl.textContent =
					logEl.textContent === "No events yet."
						? line
						: `${line}\n${logEl.textContent}`;
			};

			const summarizeMapRegistration = () => {
				const style = mapEl.mapInstance?.getStyle?.();
				if (!style) {
					return;
				}
				const sourceIds = Object.keys(style.sources || {}).filter(
					(id) => id.startsWith("sample-"),
				);
				const layerIds = (style.layers || [])
					.map((layer) => layer.id)
					.filter((id) => id.startsWith("sample-"));
				appendLog("sample-registration", {
					sourceIds,
					layerIds,
				});
			};

			mapEl.addEventListener("oc-map-ready", () => {
				statusEl.textContent = "Map ready.";
				const polygonRegistered = mapEl.setGeoJsonData(
					"sample-polygon",
					polygonData,
					{
						type: "fill",
						paint: {
							"fill-color": "#60a5fa",
							"fill-opacity": 0.14,
							"fill-outline-color": "#3b82f6",
						},
					},
				);

				const polygonOutlineRegistered = mapEl.setGeoJsonData(
					"sample-polygon-outline",
					polygonData,
					{
						sourceId: "sample-polygon",
						type: "line",
						paint: {
							"line-color": "#1d4ed8",
							"line-width": 3,
							"line-opacity": 1,
						},
					},
				);

				const lineRegistered = mapEl.setGeoJsonData(
					"sample-line",
					lineData,
					{
						type: "line",
						paint: {
							"line-color": "#dc2626",
							"line-width": 7,
							"line-opacity": 1,
						},
					},
				);

				const pointsRegistered = mapEl.setGeoJsonData(
					"sample-points",
					pointsData,
					{
						type: "circle",
						paint: {
							"circle-radius": 12,
							"circle-color": "#facc15",
							"circle-stroke-width": 4,
							"circle-stroke-color": "#111827",
						},
					},
				);

				const combinedRegistered = mapEl.setGeoJsonData(
					"sample-all",
					allSamplesData,
					{
						type: "circle",
						paint: {
							"circle-opacity": 0,
							"circle-radius": 0,
						},
						layout: {
							visibility: "none",
						},
					},
				);

				appendLog("oc-map-ready", {
					initialCenter: [5.1766, 52.2249],
					initialZoom: 14.1,
					note: "Initial viewport is fixed to Hilversum; use Fit to sample data manually.",
				});
				appendLog("setGeoJsonData-results", {
					polygonRegistered,
					polygonOutlineRegistered,
					lineRegistered,
					pointsRegistered,
					combinedRegistered,
				});
				summarizeMapRegistration();
			});

			mapEl.addEventListener("oc-map-feature-click", (event) => {
				const selectedLabel =
					event.detail?.featureProperties?.name ||
					String(event.detail?.featureId || "none");
				selectionStatusEl.textContent = `Selection: ${selectedLabel}`;
				mapEl.selectFeature(
					event.detail?.sourceId,
					event.detail?.featureId,
				);
				appendLog("oc-map-feature-click", {
					layerId: event.detail?.layerId,
					sourceId: event.detail?.sourceId,
					featureId: event.detail?.featureId,
					lngLat: event.detail?.lngLat,
					properties: event.detail?.featureProperties,
				});
			});

			mapEl.addEventListener("oc-map-error", (event) => {
				statusEl.textContent = "Map error (see log).";
				appendLog("oc-map-error", { message: event.detail?.message });
			});

			document
				.getElementById("fit-data")
				.addEventListener("click", () => {
					mapEl.fitToData("sample-all", { padding: 56, maxZoom: 14 });
				});

			document
				.getElementById("clear-selection")
				.addEventListener("click", () => {
					mapEl.clearSelection();
					selectionStatusEl.textContent = "Selection: none";
					appendLog("selection-cleared");
				});

			document
				.getElementById("toggle-points")
				.addEventListener("change", (event) => {
					mapEl.setLayerVisibility(
						"sample-points",
						event.currentTarget.checked,
					);
					appendLog("toggle-layer", {
						layerId: "sample-points",
						visible: event.currentTarget.checked,
					});
				});

			document
				.getElementById("toggle-line")
				.addEventListener("change", (event) => {
					mapEl.setLayerVisibility(
						"sample-line",
						event.currentTarget.checked,
					);
					appendLog("toggle-layer", {
						layerId: "sample-line",
						visible: event.currentTarget.checked,
					});
				});

			document
				.getElementById("toggle-polygon")
				.addEventListener("change", (event) => {
					const visible = event.currentTarget.checked;
					mapEl.setLayerVisibility("sample-polygon", visible);
					mapEl.setLayerVisibility("sample-polygon-outline", visible);
					appendLog("toggle-layer", {
						layerId: "sample-polygon + sample-polygon-outline",
						visible,
					});
				});
		</script>
	</body>
</html>
