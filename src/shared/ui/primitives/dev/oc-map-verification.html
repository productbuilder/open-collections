<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>oc-map local verification</title>
		<style>
			body {
				margin: 0;
				font-family:
					Inter,
					ui-sans-serif,
					system-ui,
					-apple-system,
					Segoe UI,
					Roboto,
					Helvetica,
					Arial,
					sans-serif;
				background: #f5f7fb;
				color: #17202a;
			}

			main {
				max-width: 980px;
				margin: 0 auto;
				padding: 20px;
				display: grid;
				gap: 12px;
			}

			.panel {
				background: #fff;
				border: 1px solid #d8deea;
				border-radius: 12px;
				padding: 12px;
			}

			.controls {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				align-items: center;
			}

			button {
				border: 1px solid #b8c2d6;
				background: #fff;
				border-radius: 8px;
				padding: 6px 10px;
				cursor: pointer;
			}

			label {
				display: inline-flex;
				align-items: center;
				gap: 6px;
			}

			oc-map {
				--oc-map-height: 480px;
			}

			pre {
				margin: 0;
				max-height: 160px;
				overflow: auto;
				background: #0d1420;
				color: #d7e2f0;
				border-radius: 8px;
				padding: 8px;
				font-size: 12px;
			}
		</style>
	</head>
	<body>
		<main>
			<header class="panel">
				<h1>oc-map local verification</h1>
				<p>Development-only page for manual primitive verification.</p>
			</header>

			<section class="panel controls">
				<button id="fit-data" type="button">Fit to sample data</button>
				<button id="clear-selection" type="button">Clear selection</button>
				<label
					><input id="toggle-points" type="checkbox" checked />
					Points</label
				>
				<label
					><input id="toggle-line" type="checkbox" checked />
					Line</label
				>
				<label
					><input id="toggle-polygon" type="checkbox" checked />
					Polygon</label
				>
				<span id="status">Waiting for map...</span>
				<span id="selection-status">Selection: none</span>
			</section>

			<oc-map
				id="demo-map"
				center-lng="5.1769"
				center-lat="52.225"
				zoom="13.6"
				style-url="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json"
			></oc-map>

			<section class="panel">
				<strong>Event log</strong>
				<pre id="log">No events yet.</pre>
			</section>
		</main>

		<script type="module">
			import "../index.js";

			const mapEl = document.getElementById("demo-map");
			const statusEl = document.getElementById("status");
			const selectionStatusEl = document.getElementById("selection-status");
			const logEl = document.getElementById("log");

			const pointsData = {
				type: "FeatureCollection",
				features: [
					{
						type: "Feature",
						id: "station",
						properties: { name: "Hilversum Station" },
						geometry: {
							type: "Point",
							coordinates: [5.1769, 52.225],
						},
					},
					{
						type: "Feature",
						id: "media-park",
						properties: { name: "Media Park" },
						geometry: {
							type: "Point",
							coordinates: [5.1608, 52.2387],
						},
					},
					{
						type: "Feature",
						id: "raadhuis",
						properties: { name: "Raadhuis Hilversum" },
						geometry: {
							type: "Point",
							coordinates: [5.1687, 52.2302],
						},
					},
					{
						type: "Feature",
						id: "corversbos",
						properties: { name: "Corversbos" },
						geometry: {
							type: "Point",
							coordinates: [5.1549, 52.2164],
						},
					},
				],
			};

			const lineData = {
				type: "FeatureCollection",
				features: [
					{
						type: "Feature",
						id: "sample-route",
						properties: { name: "Sample route" },
						geometry: {
							type: "LineString",
							coordinates: [
								[5.1552, 52.2166],
								[5.1687, 52.2302],
								[5.1769, 52.225],
								[5.1884, 52.221],
								[5.1965, 52.2272],
							],
						},
					},
				],
			};

			const polygonData = {
				type: "FeatureCollection",
				features: [
					{
						type: "Feature",
						id: "sample-region",
						properties: { name: "Compact local region" },
						geometry: {
							type: "Polygon",
							coordinates: [
								[
									[5.1665, 52.2221],
									[5.1824, 52.2221],
									[5.1824, 52.2316],
									[5.1665, 52.2316],
									[5.1665, 52.2221],
								],
							],
						},
					},
				],
			};

			const allSamplesData = {
				type: "FeatureCollection",
				features: [
					...pointsData.features,
					...lineData.features,
					...polygonData.features,
				],
			};

			const appendLog = (label, detail) => {
				const line = `${new Date().toISOString()} ${label}${detail ? `: ${JSON.stringify(detail, null, 0)}` : ""}`;
				logEl.textContent =
					logEl.textContent === "No events yet."
						? line
						: `${line}\n${logEl.textContent}`;
			};

			mapEl.addEventListener("oc-map-ready", () => {
				statusEl.textContent = "Map ready.";
				mapEl.setGeoJsonData("sample-polygon", polygonData, {
					type: "fill",
					paint: {
						"fill-color": "#22c55e",
						"fill-opacity": 0.07,
						"fill-outline-color": "#16a34a",
					},
				});

				mapEl.setGeoJsonData("sample-line", lineData, {
					type: "line",
					paint: {
						"line-color": "#7c3aed",
						"line-width": 6,
						"line-opacity": 1,
					},
				});

				mapEl.setGeoJsonData("sample-points", pointsData, {
					type: "circle",
					paint: {
						"circle-radius": 10,
						"circle-color": "#f97316",
						"circle-stroke-width": 3,
						"circle-stroke-color": "#111827",
					},
				});

				mapEl.setGeoJsonData("sample-all", allSamplesData, {
					type: "circle",
					paint: {
						"circle-opacity": 0,
						"circle-radius": 0,
					},
					layout: {
						visibility: "none",
					},
				});

				mapEl.fitToData("sample-all", { padding: 56, maxZoom: 14 });
				appendLog("oc-map-ready");
			});

			mapEl.addEventListener("oc-map-feature-click", (event) => {
				const selectedLabel =
					event.detail?.featureProperties?.name ||
					String(event.detail?.featureId || "none");
				selectionStatusEl.textContent = `Selection: ${selectedLabel}`;
				mapEl.selectFeature(event.detail?.sourceId, event.detail?.featureId);
				appendLog("oc-map-feature-click", {
					layerId: event.detail?.layerId,
					sourceId: event.detail?.sourceId,
					featureId: event.detail?.featureId,
					lngLat: event.detail?.lngLat,
					properties: event.detail?.featureProperties,
				});
			});

			mapEl.addEventListener("oc-map-error", (event) => {
				statusEl.textContent = "Map error (see log).";
				appendLog("oc-map-error", { message: event.detail?.message });
			});

			document
				.getElementById("fit-data")
				.addEventListener("click", () => {
					mapEl.fitToData("sample-all", { padding: 56, maxZoom: 14 });
				});

			document
				.getElementById("clear-selection")
				.addEventListener("click", () => {
					mapEl.clearSelection();
					selectionStatusEl.textContent = "Selection: none";
					appendLog("selection-cleared");
				});

			document
				.getElementById("toggle-points")
				.addEventListener("change", (event) => {
					mapEl.setLayerVisibility(
						"sample-points",
						event.currentTarget.checked,
					);
				});

			document
				.getElementById("toggle-line")
				.addEventListener("change", (event) => {
					mapEl.setLayerVisibility(
						"sample-line",
						event.currentTarget.checked,
					);
				});

			document
				.getElementById("toggle-polygon")
				.addEventListener("change", (event) => {
					mapEl.setLayerVisibility(
						"sample-polygon",
						event.currentTarget.checked,
					);
				});
		</script>
	</body>
</html>
