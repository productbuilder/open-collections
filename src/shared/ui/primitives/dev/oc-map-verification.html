<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oc-map local verification</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #f5f7fb;
        color: #17202a;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        gap: 12px;
      }

      .panel {
        background: #fff;
        border: 1px solid #d8deea;
        border-radius: 12px;
        padding: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      button {
        border: 1px solid #b8c2d6;
        background: #fff;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      oc-map {
        --oc-map-height: 480px;
      }

      pre {
        margin: 0;
        max-height: 160px;
        overflow: auto;
        background: #0d1420;
        color: #d7e2f0;
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="panel">
        <h1>oc-map local verification</h1>
        <p>Development-only page for manual primitive verification.</p>
      </header>

      <section class="panel controls">
        <button id="fit-data" type="button">Fit to sample data</button>
        <label><input id="toggle-points" type="checkbox" checked /> Points</label>
        <label><input id="toggle-line" type="checkbox" checked /> Line</label>
        <label><input id="toggle-polygon" type="checkbox" checked /> Polygon</label>
        <span id="status">Waiting for map...</span>
      </section>

      <oc-map id="demo-map" center-lng="5.1769" center-lat="52.225" zoom="11"></oc-map>

      <section class="panel">
        <strong>Event log</strong>
        <pre id="log">No events yet.</pre>
      </section>
    </main>

    <script type="module">
      import "../index.js";

      const mapEl = document.getElementById("demo-map");
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");

      const pointsData = {
        type: "FeatureCollection",
        features: [
          {
            type: "Feature",
            properties: { name: "Hilversum Station" },
            geometry: { type: "Point", coordinates: [5.1769, 52.225] },
          },
          {
            type: "Feature",
            properties: { name: "Media Park" },
            geometry: { type: "Point", coordinates: [5.1608, 52.2387] },
          },
          {
            type: "Feature",
            properties: { name: "Corversbos" },
            geometry: { type: "Point", coordinates: [5.1468, 52.2183] },
          },
        ],
      };

      const lineData = {
        type: "FeatureCollection",
        features: [
          {
            type: "Feature",
            properties: { name: "Sample route" },
            geometry: {
              type: "LineString",
              coordinates: [
                [5.132, 52.2136],
                [5.1608, 52.2387],
                [5.2095, 52.2375],
              ],
            },
          },
        ],
      };

      const polygonData = {
        type: "FeatureCollection",
        features: [
          {
            type: "Feature",
            properties: { name: "Sample region" },
            geometry: {
              type: "Polygon",
              coordinates: [
                [
                  [5.1305, 52.2095],
                  [5.231, 52.2095],
                  [5.231, 52.257],
                  [5.1305, 52.257],
                  [5.1305, 52.2095],
                ],
              ],
            },
          },
        ],
      };

      const allSamplesData = {
        type: "FeatureCollection",
        features: [...pointsData.features, ...lineData.features, ...polygonData.features],
      };

      const appendLog = (label, detail) => {
        const line = `${new Date().toISOString()} ${label}${detail ? `: ${JSON.stringify(detail, null, 0)}` : ""}`;
        logEl.textContent = logEl.textContent === "No events yet." ? line : `${line}\n${logEl.textContent}`;
      };

      mapEl.addEventListener("oc-map-ready", () => {
        statusEl.textContent = "Map ready.";
        mapEl.setGeoJsonData("sample-points", pointsData, {
          type: "circle",
          paint: {
            "circle-radius": 8,
            "circle-color": "#f97316",
            "circle-stroke-width": 2,
            "circle-stroke-color": "#ffffff",
          },
        });

        mapEl.setGeoJsonData("sample-line", lineData, {
          type: "line",
          paint: {
            "line-color": "#1d4ed8",
            "line-width": 5,
            "line-opacity": 0.9,
          },
        });

        mapEl.setGeoJsonData("sample-polygon", polygonData, {
          type: "fill",
          paint: {
            "fill-color": "#10b981",
            "fill-opacity": 0.3,
            "fill-outline-color": "#065f46",
          },
        });

        mapEl.setGeoJsonData("sample-all", allSamplesData, {
          type: "circle",
          paint: {
            "circle-opacity": 0,
            "circle-radius": 0,
          },
          layout: {
            visibility: "none",
          },
        });

        mapEl.fitToData("sample-all", { padding: 56, maxZoom: 13 });
        appendLog("oc-map-ready");
      });

      mapEl.addEventListener("oc-map-feature-click", (event) => {
        appendLog("oc-map-feature-click", {
          layerId: event.detail?.layerId,
          name: event.detail?.feature?.properties?.name,
        });
      });

      mapEl.addEventListener("oc-map-error", (event) => {
        statusEl.textContent = "Map error (see log).";
        appendLog("oc-map-error", { message: event.detail?.message });
      });

      document.getElementById("fit-data").addEventListener("click", () => {
        mapEl.fitToData("sample-all", { padding: 56, maxZoom: 13 });
      });

      document.getElementById("toggle-points").addEventListener("change", (event) => {
        mapEl.setLayerVisibility("sample-points", event.currentTarget.checked);
      });

      document.getElementById("toggle-line").addEventListener("change", (event) => {
        mapEl.setLayerVisibility("sample-line", event.currentTarget.checked);
      });

      document.getElementById("toggle-polygon").addEventListener("change", (event) => {
        mapEl.setLayerVisibility("sample-polygon", event.currentTarget.checked);
      });
    </script>
  </body>
</html>
